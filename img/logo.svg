<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="HupfGaudi Vilshofen">

  <!-- ═══ FARBSPRITZER ═══ -->
  <ellipse cx="22" cy="148" rx="7" ry="11" fill="#ffcc00" transform="rotate(-20,22,148)"/>
