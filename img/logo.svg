  <ellipse cx="478" cy="138" rx="7" ry="11" fill="#ff5a1f" transform="rotate(20,478,138)"/>
  <circle  cx="490" cy="170" r="5"  fill="#ffcc00"/>
  <ellipse cx="470" cy="198" rx="5" ry="8"  fill="#00b4d8" transform="rotate(-15,470,198)"/>
  <circle  cx="484" cy="225" r="4"  fill="#ff5a1f"/>
  <ellipse cx="162" cy="18" rx="5" ry="8" fill="#00b4d8" transform="rotate(5,162,18)"/>
  <circle  cx="188" cy="10" r="4"  fill="#ffcc00"/>
  <ellipse cx="318" cy="20" rx="5" ry="8" fill="#ff5a1f" transform="rotate(-5,318,20)"/>
